<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PopChats | Login</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="center-mode">
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="logo">Pop<span>Chats</span></a>
        </div>
    </nav>

    <div class="auth-card">
    <h2>Welcome</h2>
    <p>Just Enter any Username you like and join the conversation!</p>
    
    <form id='login-form' class="auth-form">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username-input" name="username" placeholder="e.g. ghost_user" required>
            <div id="error-message" class="error-popup" style="color: #ff4444; margin-bottom: 10px; font-size:10px; display:none;"></div>
            <button type="submit" class="primary-btn full-width">Join Chat!</button>
        </div> 
    </form> 
    <div id="loader" class="loader-container" style="display: none;">
        <div class="pulse-ring"></div>
        <p class="loading-text">Hang Tight! We're getting you in...</p>
    </div>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="static/script.js"></script>
</body>
</html>
</body>
</html>
